name: 动量+价值选股筛

on:
  # 美股收盘后运行（UTC 22:00 = 北京时间次日 06:00），与每日分析(21:30)错开
  schedule:
    - cron: '0 22 * * 1-5'

  workflow_dispatch:
    inputs:
      stocks:
        description: '扫描标的（逗号分隔，DSA 代码格式；留空用 STOCK_LIST）'
        required: false
        default: ''
      universe:
        description: '扫描范围（留空=STOCK_LIST；sp500=标普500成分股）'
        required: false
        default: ''
      notify_empty:
        description: '无信号时也推送'
        required: false
        default: false
        type: boolean

concurrency:
  group: stock-screener
  cancel-in-progress: false

# contents: write 用于提交信号历史 data/screener_signals.jsonl
# actions: write 用于强信号触发每日分析工作流（workflow_dispatch）
permissions:
  contents: write
  actions: write

jobs:
  screen:
    runs-on: ubuntu-latest
    environment: STOCK_LIST
    timeout-minutes: 15

    steps:
      - name: 检出 DSA
        uses: actions/checkout@v5

      - name: 检出 ai-berkshire（screener 实现与基本面数据）
        uses: actions/checkout@v5
        with:
          repository: Estel-lab/ai-berkshire
          path: ai-berkshire
          token: ${{ secrets.AI_BERKSHIRE_TOKEN || github.token }}

      - name: 设置 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 执行选股筛并推送
        env:
          AI_BERKSHIRE_DIR: ${{ github.workspace }}/ai-berkshire
          SCREENER_STOCKS: ${{ github.event.inputs.stocks }}
          # 扫描范围：留空=STOCK_LIST；sp500=标普500成分股（读 data/universe/sp500.csv，按市值权重排序）
          SCREENER_UNIVERSE: ${{ github.event.inputs.universe || vars.SCREENER_UNIVERSE }}
          # 全市场扫描限速护栏：标的上限；标普500 按市值权重排序，故即「扫市值最大的前 N 只」
          SCREENER_UNIVERSE_LIMIT: ${{ vars.SCREENER_UNIVERSE_LIMIT || '350' }}
          # 只推分数最高的前 N 只买入信号（0=不限）
          SCREENER_TOP_N: ${{ vars.SCREENER_TOP_N || '10' }}
          SCREENER_NOTIFY_EMPTY: ${{ github.event.inputs.notify_empty || vars.SCREENER_NOTIFY_EMPTY || 'false' }}
          STOCK_LIST_CONFIG: ${{ vars.STOCK_LIST || secrets.STOCK_LIST }}

          # 通知渠道（与每日分析共用同一套 Secrets，配置任意一个即可）
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
          WECHAT_MSG_TYPE: ${{ vars.WECHAT_MSG_TYPE || secrets.WECHAT_MSG_TYPE || 'markdown' }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_WEBHOOK_SECRET: ${{ secrets.FEISHU_WEBHOOK_SECRET }}
          FEISHU_WEBHOOK_KEYWORD: ${{ vars.FEISHU_WEBHOOK_KEYWORD || secrets.FEISHU_WEBHOOK_KEYWORD }}
          DINGTALK_WEBHOOK_URL: ${{ secrets.DINGTALK_WEBHOOK_URL }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_MESSAGE_THREAD_ID: ${{ secrets.TELEGRAM_MESSAGE_THREAD_ID }}
          EMAIL_SENDER: ${{ vars.EMAIL_SENDER || secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVERS: ${{ vars.EMAIL_RECEIVERS || secrets.EMAIL_RECEIVERS }}
          PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
          PUSHOVER_API_TOKEN: ${{ secrets.PUSHOVER_API_TOKEN }}
          NTFY_URL: ${{ secrets.NTFY_URL }}
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
          GOTIFY_URL: ${{ secrets.GOTIFY_URL }}
          GOTIFY_TOKEN: ${{ secrets.GOTIFY_TOKEN }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          PUSHPLUS_TOPIC: ${{ vars.PUSHPLUS_TOPIC || secrets.PUSHPLUS_TOPIC }}
          CUSTOM_WEBHOOK_URLS: ${{ secrets.CUSTOM_WEBHOOK_URLS }}
          CUSTOM_WEBHOOK_BEARER_TOKEN: ${{ secrets.CUSTOM_WEBHOOK_BEARER_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_MAIN_CHANNEL_ID: ${{ secrets.DISCORD_MAIN_CHANNEL_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          SERVERCHAN3_SENDKEY: ${{ secrets.SERVERCHAN3_SENDKEY }}
          ASTRBOT_URL: ${{ secrets.ASTRBOT_URL }}
          ASTRBOT_TOKEN: ${{ secrets.ASTRBOT_TOKEN }}

          # 通知路由：信号走 alert 路由，可用 NOTIFICATION_ALERT_CHANNELS 单独指定渠道
          NOTIFICATION_ALERT_CHANNELS: ${{ vars.NOTIFICATION_ALERT_CHANNELS || secrets.NOTIFICATION_ALERT_CHANNELS }}

          LOG_LEVEL: INFO
        run: |
          # 与每日分析保持一致的 STOCK_LIST 解析优先级
          if [ -n "${STOCK_LIST_CONFIG:-}" ]; then
            export STOCK_LIST="$STOCK_LIST_CONFIG"
          fi
          python scripts/screener_notify.py

      - name: 上传结果快照
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screener-results
          path: reports/screener/
          if-no-files-found: ignore

      # 强信号自动深研（opt-in）：存在 BUY 信号且仓库变量 SCREENER_TRIGGER_DEEP_ANALYSIS=true
      # 时，触发每日分析工作流对信号标的做 LLM 深度分析（stocks-only，消耗 LLM 配额）
      - name: 强信号触发深度分析
        if: vars.SCREENER_TRIGGER_DEEP_ANALYSIS == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TRIGGER_FILE=reports/screener/trigger_stocks.txt
          if [ ! -s "$TRIGGER_FILE" ]; then
            echo "无 BUY 信号，跳过深度分析触发"
            exit 0
          fi
          STOCKS=$(cat "$TRIGGER_FILE")
          echo "🎯 触发深度分析: $STOCKS"
          curl -sS --fail -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/actions/workflows/00-daily-analysis.yml/dispatches" \
            -d "{\"ref\":\"${GITHUB_REF_NAME}\",\"inputs\":{\"mode\":\"stocks-only\",\"force_run\":\"true\",\"stocks\":\"${STOCKS}\"}}"

      # 信号历史入库：append-only jsonl，供每周一复盘胜率统计
      - name: 提交信号历史
        run: |
          if [ ! -f data/screener_signals.jsonl ]; then
            echo "无信号历史文件，跳过提交"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/screener_signals.jsonl
          if git diff --cached --quiet; then
            echo "无新增信号，跳过提交"
            exit 0
          fi
          git commit -m "chore: append screener signal history $(date -u +%Y-%m-%d)"
          git pull --rebase origin "${GITHUB_REF_NAME}" || true
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: 失败告警
        if: failure()
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_WEBHOOK_SECRET: ${{ secrets.FEISHU_WEBHOOK_SECRET }}
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
          WORKFLOW_NAME: ${{ github.workflow }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python3 scripts/notify_workflow_failure.py
