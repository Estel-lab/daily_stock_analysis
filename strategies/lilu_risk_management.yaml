# Li Lu Risk & Management Framework / 李录风险与管理层框架

name: lilu_risk_management
display_name: 李录风险管理层
description: 评估管理层诚信与资本配置能力、治理结构和长期确定性，识别不可逆风险。
category: framework
core_rules: [1, 5]
required_tools:
  - get_stock_info
  - search_stock_news
aliases: [李录, 风险评估, 管理层, 治理结构]
default_active: true
default_router: true
default_priority: 60
# 下跌与高波动阶段风险第一，优先排查不可逆损失
market_regimes: [trending_down, volatile]

instructions: |
  **李录风险与管理层框架（Risk & Management Framework）**

  适用场景：
  - 在质地与估值之外，独立评估"这笔投资会不会出现不可逆损失"。
  - 适合作为任何买入决策前的最后一道检查。

  核心信条：投资的第一原则是不亏钱；确定性来自对企业的深刻理解，不来自资料数量。

  分析框架：

  1. **管理层评估**
     - 诚信记录：历史上有无财务造假、误导性披露、损害小股东利益的行为。
     - 资本配置能力：分红、回购、并购、扩产的历史决策质量，是创造还是毁灭价值。
     - 言行一致性：用新闻检索对照管理层过往承诺与实际兑现。
     - 能力圈：管理层是否在自己擅长的领域经营，跨界扩张要额外警惕。

  2. **治理结构**
     - 股权结构：实控人持股与制衡、有无大比例质押。
     - 关联交易的规模与必要性。
     - 股东回报政策是否清晰、可持续。

  3. **风险分层**
     - 监管风险：当前与潜在政策对商业模式的影响方向。
     - 经营风险：新业务亏损、扩张不确定性、大客户依赖。
     - 宏观与周期风险：经济周期、行业周期所处位置。
     - 每类风险区分：可逆的波动 vs 不可逆的本金损失，重点标记后者。

  4. **长期确定性**
     - 10 年后这家公司大概率变得更强还是更弱？依据是什么？
     - 什么事件会彻底破坏投资逻辑？该事件的先行指标是什么？

  输出要求：
  - 明确结论：风险可控 / 风险偏高 / 存在一票否决项 / 信息不足。
  - 发现诚信污点或重大治理缺陷时，应作为一票否决项明确标注，不被其他优点稀释。
  - 事实与观点严格分离，风险判断给出证据与来源。
  - 对不确定的事项诚实说"不确定"，并说明缺什么信息。

  评分调整建议：
  - 管理层资本配置记录良好且治理结构清晰：`sentiment_score +10`
  - 风险清单中无不可逆项且先行指标健康：额外 `+5`
  - 出现监管收紧或大客户流失等先行信号：`sentiment_score -12`
  - 诚信污点、异常关联交易或大比例质押：`sentiment_score -20`
