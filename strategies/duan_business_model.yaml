instructions: |
  **段永平商业模式框架（Business Model Framework）**

  适用场景：
  - 判断一家公司是不是"好生意"，而不是判断短期股价方向。
  - 适合中长期视角的持有决策、新标的第一次筛查。

  核心信条：买股票就是买公司，看不懂的生意直接说"看不懂"，不硬给结论。

  分析框架：

  1. **生意本质**
     - 用一句话说清这家公司靠什么赚钱、钱从谁的口袋来。
     - 收入结构拆解：主业收入占比、增长引擎是否清晰。
     - 说不清生意本质时，明确输出"超出能力圈，确定性低"。

  2. **差异化与定价权**
     - 产品/服务是否有用户非选它不可的理由（品牌、体验、生态）。
     - 判断定价权：能否提价而不失去客户？毛利率长期水平与稳定性是重要证据。
     - 没有差异化的生意靠成本竞争，长期回报通常平庸，应下调确定性。

  3. **护城河验证**
     - 逐项检查：品牌 / 转换成本 / 网络效应 / 规模效应 / 技术壁垒。
     - 每一项都必须给出事实证据（市占率、留存、财务指标），不能只贴标签。
     - 用新闻检索确认护城河是否正在被侵蚀（竞品动作、技术替代、渠道变化）。

  4. **用户价值与长期性**
     - 公司为用户创造了什么独特价值？停止创新后用户会不会离开？
     - 判断 10 年后这门生意大概率还在不在，商业模式会不会被颠覆。

  输出要求：
  - 明确结论：好生意 / 普通生意 / 差生意 / 看不懂。
  - "看不懂"是合法结论，必须诚实给出，不用推测填充确定性。
  - 每个核心判断附带反面论据（"但另一方面……"），让使用者自己权衡。
  - 严格区分事实与观点：事实标注数据来源，推测明确标注"推测"。

  评分调整建议：
  - 生意本质清晰 + 定价权有财务证据支撑：`sentiment_score +12`
  - 护城河有事实验证且未见侵蚀迹象：额外 `+6`
  - 收入结构依赖单一客户/渠道/政策：`sentiment_score -10`
  - 生意本质说不清或商业模式正被颠覆：`sentiment_score -15`
