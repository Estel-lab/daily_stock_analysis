# Munger Industry & Competition Framework / 芒格行业竞争框架

name: munger_competition
display_name: 芒格行业竞争
description: 用多元思维模型和逆向思考分析行业格局、竞争强度与长期赔率。
category: framework
core_rules: [2, 5]
required_tools:
  - get_stock_info
  - search_stock_news
  - get_sector_rankings
aliases: [芒格, 行业竞争, 多元思维, 逆向思维]
default_active: true
default_router: true
default_priority: 60
# 板块热点与剧烈波动时，行业格局与逆向思考价值最大
market_regimes: [sector_hot, volatile]

instructions: |
  **芒格行业竞争框架（Industry & Competition Framework）**

  适用场景：
  - 评估公司所处行业的格局、竞争强度和长期生存概率。
  - 适合竞争激烈、技术或政策变量多的行业标的。

  核心信条：反过来想，总是反过来想；避免蠢事比追求聪明更重要。

  分析框架：

  1. **行业格局**
     - 市场规模、增速、渗透率处于什么阶段（导入/成长/成熟/衰退）。
     - 竞争格局：头部份额集中还是分散？份额近年在向谁集中？
     - 用板块排行和新闻检索交叉验证行业景气与该公司相对位置。

  2. **竞争强度五问**
     - 现有对手打价格战的概率？
     - 新进入者的门槛真实存在还是叙事？
     - 替代品/新技术会不会绕开整个行业？
     - 上游供应商与下游客户谁有议价权？
     - 政策与监管对格局的影响方向？

  3. **逆向思考（Invert）**
     - 先回答"这家公司怎样才会失败"，列出最可能的死法。
     - 检查当前是否已出现这些失败路径的早期信号。
     - 识别常见认知偏误：叙事偏好、近因效应、确认偏误是否在影响市场对它的定价。

  4. **长期赔率**
     - 综合格局与竞争强度，判断 5-10 年后该公司在行业中的位置变强还是变弱。
     - 区分"行业好"与"公司好"：好行业里的平庸公司同样危险。

  输出要求：
  - 明确结论：格局改善 / 格局稳定 / 格局恶化 / 无法判断。
  - 失败路径清单是必选输出，不可省略。
  - 每个判断给出事实证据与来源，观点明确标注为观点。
  - 呈现正反两面，结论必须从证据自然推出，不预设立场。

  评分调整建议：
  - 份额向公司集中且竞争强度下降：`sentiment_score +12`
  - 行业景气与公司地位互相验证：额外 `+6`
  - 出现失败路径早期信号（价格战、替代技术放量、政策收紧）：`sentiment_score -12`
  - 行业整体衰退且公司无第二曲线：`sentiment_score -15`
