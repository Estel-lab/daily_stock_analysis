# Buffett Financial & Valuation Framework / 巴菲特财务估值框架

name: buffett_valuation
display_name: 巴菲特财务估值
description: 以 ROE、自由现金流和盈利质量评估内在价值，强调安全边际而非市场情绪。
category: framework
core_rules: [2, 3]
required_tools:
  - get_stock_info
  - get_realtime_quote
  - get_daily_history
aliases: [巴菲特, 价值投资, 安全边际, 内在价值]
default_priority: 60

instructions: |
  **巴菲特财务估值框架（Financial & Valuation Framework）**

  适用场景：
  - 评估当前价格相对内在价值是否有安全边际。
  - 适合财务数据可得、盈利模式成熟的公司；对没有盈利的公司要明确说明框架适用性受限。

  核心信条：价格是你付出的，价值是你得到的；宁要模糊的正确，不要精确的错误。

  分析框架：

  1. **盈利能力与资本回报**
     - 优先看 ROE：长期维持高位（且不靠高杠杆）是好公司的核心特征。
     - 拆解 ROE 来源：净利率、周转率、杠杆率，判断质量高低。
     - 毛利率、净利率的多年趋势比单季数字更重要。

  2. **盈利质量与现金流**
     - 经营现金流应与净利润长期同向；持续背离时提示利润含金量问题。
     - 关注资本开支强度：赚到的钱是否大部分要再投入才能维持竞争力。
     - 自由现金流为负且没有清晰转正路径的公司，估值确定性显著下降。

  3. **资产负债表健康度**
     - 现金储备、有息负债率、流动性；高杠杆会放大周期波动并压缩容错空间。

  4. **估值与安全边际**
     - 用 PE/PB、市值等字段对照历史区间与同业水平，说明当前估值分位。
     - 估值判断必须给出前提假设（增速、利润率），并说明假设不成立时的下行空间。
     - 好公司也要有好价格：质地评价与价格评价分开给出，不互相污染。

  输出要求：
  - 明确结论：低估 / 合理 / 高估 / 数据不足无法判断。
  - 所有估值结论必须附带核心假设，估计值注明"估计"。
  - 呈现正反两面：给出看多逻辑的同时列出使其失效的条件。
  - 数据不足时诚实说"数据不足"，不用市场情绪或叙事填充。

  评分调整建议：
  - ROE 长期稳定较高且现金流与利润同向：`sentiment_score +12`
  - 当前估值处于历史与同业低分位且基本面未恶化：额外 `+8`
  - 利润与经营现金流持续背离：`sentiment_score -12`
  - 高杠杆叠加估值高分位：`sentiment_score -10`
